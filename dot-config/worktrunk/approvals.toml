    "pitchfork restart",
    "pitchfork restart --all",
    '''printf '[env]\nAPI_PORT=%s\nSERVE_PORT=%s\nSTORYBOOK_PORT=%s\n' '{{ ("api-" ~ branch) | hash_port }}' '{{ ("serve-" ~ branch) | hash_port }}' '{{ ("sb-" ~ branch) | hash_port }}' > mise.local.toml''',
    '''printf '[env]\nAPI_PORT=%s\nSERVE_PORT=%s\nSTORYBOOK_PORT=%s\nREDIS_PORT=%s\n' '{{ ("api-" ~ branch) | hash_port }}' '{{ ("serve-" ~ branch) | hash_port }}' '{{ ("sb-" ~ branch) | hash_port }}' '{{ ("redis-" ~ branch) | hash_port }}' > mise.local.toml''',
