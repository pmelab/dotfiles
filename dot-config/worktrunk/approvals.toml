[projects."/Users/pmelab/Code/moad"]
approved-commands = [
    "devbox services stop",
    "direnv allow",
    "pnpm install",
    '''printf 'export WAKU_PORT=%s\nexport STORYBOOK_PORT=%s\n' '{{ ("waku-" ~ branch) | hash_port }}' '{{ ("sb-" ~ branch) | hash_port }}' > .ports.env''',
    "source .ports.env && devbox services start",
]

